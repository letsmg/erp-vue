name: 🚀 Build & Deploy ERP Monolito Atômico

on:
  push:
    branches: [main]

jobs:
  build-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, gd, zip, pgsql

      - name: 📝 Prepare Build Env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: 📦 Install Composer
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🔨 Build Vite Assets
        run: |
          npm install
          npm run build

      - name: 🤐 Criar Pacote de Deploy
        run: zip -r deploy.zip . -x ".git/*" "node_modules/*" ".github/*" "tests/*" ".env*" "storage/*"

      - name: 🔑 Configure SSH & Known Hosts
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: 🚀 Deploy Atômico (Zero Downtime)
        run: |
          scp deploy.zip ubuntu@${{ secrets.SERVER_IP }}:/tmp/erp_deploy.zip

          ssh ubuntu@${{ secrets.SERVER_IP }} << 'EOF'
            set -e
            
            # 1. Preparar pasta temporária para a nova versão
            sudo rm -rf /var/www/erp_new
            sudo mkdir -p /var/www/erp_new
            sudo unzip -o /tmp/erp_deploy.zip -d /var/www/erp_new
            
            # 2. Linkar os arquivos persistentes (Shared)
            sudo ln -sfn /var/www/erp_shared/.env /var/www/erp_new/.env
            sudo ln -sfn /var/www/erp_shared/storage /var/www/erp_new/storage
            
            # 3. Rodar comandos de produção na pasta nova
            cd /var/www/erp_new
            sudo -u www-data php artisan migrate --force  # <-- SEMPRE SEM FRESH
            sudo -u www-data php artisan storage:link
            sudo -u www-data php artisan optimize
            
            # 4. SWAP ATÔMICO: O momento em que o site atualiza
            # Importante: o Nginx deve apontar para /var/www/erp_live
            sudo ln -sfn /var/www/erp_new /var/www/erp_live
            
            # 5. Permissões e Limpeza
            sudo chown -R www-data:www-data /var/www/erp_new
            sudo systemctl restart php8.3-fpm
            sudo rm /tmp/erp_deploy.zip
            
            echo "✅ Deploy do ERP Monolito Finalizado!"
          EOF