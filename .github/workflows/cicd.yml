name: 🚀 Build & Deploy ERP Vue (Atômico)

on:
  push:
    branches: [main]

jobs:
  build-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, gd, zip, pgsql

      - name: 📦 Install Composer
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🔨 Build Assets (Vite/TS)
        run: |
          npm install
          npm run build

      - name: 🤐 Criar Pacote de Deploy
        run: zip -r deploy.zip . -x ".git/*" "node_modules/*" ".github/*" "tests/*" ".env*" "storage/*"

      - name: 🔑 Configure SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: 🚀 Deploy Atômico
        run: |
          PROJECT_NAME="erp-vue"
          scp deploy.zip ubuntu@${{ secrets.SERVER_IP }}:/tmp/${PROJECT_NAME}-deploy.zip

          ssh ubuntu@${{ secrets.SERVER_IP }} << 'EOF'
            set -e
            
            # CONFIGURAÇÃO DE VARIÁVEIS COM HÍFEN
            PROJECT="erp-vue"
            BASE_PATH="/var/www/$PROJECT"
            SHARED_PATH="${BASE_PATH}-shared"
            LIVE_LINK="${BASE_PATH}-live"
            NEW_RELEASE="${BASE_PATH}-new"
            
            # 1. Preparar estrutura inicial se não existir
            sudo mkdir -p ${SHARED_PATH}/storage/app/public
            sudo mkdir -p ${SHARED_PATH}/storage/framework/cache
            sudo mkdir -p ${SHARED_PATH}/storage/framework/sessions
            sudo mkdir -p ${SHARED_PATH}/storage/framework/views
            sudo mkdir -p ${SHARED_PATH}/storage/logs
            
            # 2. Limpar e descompactar nova versão
            sudo rm -rf ${NEW_RELEASE}
            sudo mkdir -p ${NEW_RELEASE}
            sudo unzip -o /tmp/${PROJECT}-deploy.zip -d ${NEW_RELEASE}
            
            # 3. Vincular arquivos persistentes (Shared)
            sudo ln -sfn ${SHARED_PATH}/.env ${NEW_RELEASE}/.env
            sudo rm -rf ${NEW_RELEASE}/storage
            sudo ln -sfn ${SHARED_PATH}/storage ${NEW_RELEASE}/storage
            
            # 4. Ajustar permissões para o Nginx
            sudo chown -R www-data:www-data ${NEW_RELEASE}
            sudo chown -R www-data:www-data ${SHARED_PATH}/storage
            
            # 5. Link de Storage Público
            sudo rm -rf ${NEW_RELEASE}/public/storage
            sudo ln -sfn ${SHARED_PATH}/storage/app/public ${NEW_RELEASE}/public/storage
            
            # 6. Comandos Laravel pós-deploy
            cd ${NEW_RELEASE}
            sudo -u www-data php artisan migrate --force
            sudo -u www-data php artisan optimize
            
            # 7. SWAP ATÔMICO (Ativação)
            sudo ln -sfn ${NEW_RELEASE} ${LIVE_LINK}
            
            # 8. Finalização
            sudo systemctl restart php8.3-fpm
            sudo rm /tmp/${PROJECT}-deploy.zip
            
            echo "✅ Deploy de $PROJECT finalizado com sucesso no padrão de hifens!"
          EOF