name: 🚀 CI and Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # ✅ Adiciona o PostgreSQL como serviço para os testes
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: erp_vue_laravel
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 123456
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql
          cache: composer # ⚡ Cache de dependências PHP

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          npm install
          npm run build

      - name: Run Tests
        run: php artisan test --stop-on-failure
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: erp_vue_laravel
          DB_USERNAME: postgres
          DB_PASSWORD: 123456

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: 🔑 Configure SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🚀 Executar deploy no servidor
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@147.15.80.52 << 'EOF'
            set -e
            
            echo "🛡️ Configurando exceção de segurança do Git"
            git config --global --add safe.directory /var/www/erp

            cd /var/www/erp
            
            echo "📥 Atualizando código..."
            sudo chown -R ubuntu:www-data /var/www/erp
            git reset --hard
            git pull origin main

            echo "📦 Dependências e Build..."
            composer install --no-dev --optimize-autoloader
            npm install
            npm run build

            echo "🧹 Otimização Laravel..."
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            echo "🗄️ Migrations..."
            php artisan migrate --force --seed

            echo "🔐 Restaurando permissões de produção..."
            sudo chown -R www-data:www-data /var/www/erp
            sudo chmod -R 775 storage bootstrap/cache

            echo "🔄 Reiniciando PHP..."
            sudo systemctl restart php8.3-fpm
            
            echo "✅ Deploy finalizado com sucesso!"
          EOF